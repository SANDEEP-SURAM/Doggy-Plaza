<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order Success - Doggy Plaza</title>
  <style>
    body{font-family:Arial;background:#f3f4f6;margin:0}
    .box{max-width:850px;margin:40px auto;background:#fff;padding:22px;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
    .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center}
    .badge{padding:6px 10px;border-radius:999px;background:#e5f7ee;color:#0f7a3a;font-weight:700;font-size:13px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    .card{border:1px solid #eee;border-radius:14px;padding:14px;background:#fafafa}
    .label{color:#6b7280;font-size:12px;margin-bottom:6px}
    .value{font-size:14px;font-weight:700;color:#111827}
    .items{margin-top:14px}
    .item{display:flex;gap:12px;border:1px solid #eee;border-radius:14px;padding:10px;margin-top:10px}
    .item img{width:60px;height:60px;object-fit:cover;border-radius:12px;background:#fff;border:1px solid #eee}
    .item h4{margin:0;font-size:14px}
    .muted{color:#6b7280;font-size:13px;margin-top:4px}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    .btn{padding:10px 14px;border-radius:12px;background:#111827;color:#fff;text-decoration:none;font-weight:700}
    .btn.gray{background:#374151}
  </style>
</head>
<body>
  <div class="box">
    <div class="top">
      <h2 style="margin:0">✅ Order placed successfully!</h2>
      <span class="badge" id="statusBadge">Pending</span>
    </div>

    <div class="grid">
      <div class="card">
        <div class="label">Order ID</div>
        <div class="value" id="orderId">-</div>
      </div>
      <div class="card">
        <div class="label">Total</div>
        <div class="value" id="total">-</div>
      </div>
      <div class="card">
        <div class="label">Customer</div>
        <div class="value" id="name">-</div>
      </div>
      <div class="card">
        <div class="label">Phone</div>
        <div class="value" id="phone">-</div>
      </div>
      <div class="card" style="grid-column:1/-1">
        <div class="label">Delivery Address</div>
        <div class="value" id="address">-</div>
      </div>
    </div>

    <div class="items">
      <h3 style="margin:16px 0 0">Items</h3>
      <div id="itemsList"></div>
    </div>

    <div class="btns">
      <a class="btn" href="/">Go to Home</a>
      <a class="btn gray" href="/admin.html">Admin Orders</a>
    </div>
  </div>

  <script src="success.js"></script>
</body>
</html>
