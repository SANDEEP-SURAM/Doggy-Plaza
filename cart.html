<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart - Doggy Plaza</title>
  <link rel="stylesheet" href="cart.css" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
  <!-- Top Bar -->
  <header class="cart-topbar">
    <button class="back-btn" onclick="goBack()">
    <i class="fa-solid fa-arrow-left"></i>
  </button>
    <a class="brand" href="index.html">
      🐾 <span>Doggy Plaza</span>
    </a>

    <div class="top-actions">
      <a class="link" href="wishlist.html"><i class="fa-regular fa-heart"></i> Wishlist</a>
      <a class="link active" href="cart.html"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
    </div>
  </header>

<!-- Checkout Stepper -->
<div class="checkout-stepper">
  <div class="step active">
    <div class="circle"><i class="fa-solid fa-cart-shopping"></i></div>
    <span>Cart</span>
  </div>

  <div class="line"></div>

  <div class="step">
    <div class="circle"><i class="fa-solid fa-house"></i></div>
    <span>Address</span>
  </div>

  <div class="line"></div>

  <div class="step">
    <div class="circle"><i class="fa-solid fa-clipboard-check"></i></div>
    <span>Review</span>
  </div>

  <div class="line"></div>

  <div class="step">
    <div class="circle"><i class="fa-solid fa-credit-card"></i></div>
    <span>Payment</span>
  </div>
</div>


  <main class="cart-wrap">
    <!-- Left: Items -->
    <section class="cart-left">
      <div class="cart-title-row">
        <h2>Your Cart</h2>
        <button class="btn btn-outline" id="clearCartBtn">
          <i class="fa-regular fa-trash-can"></i> Clear cart
        </button>
      </div>

      <div id="cartList" class="cart-list"></div>

      <div class="cart-footer-actions">
        <a href="index.html" class="btn btn-outline">
          <i class="fa-solid fa-arrow-left"></i> Continue shopping
        </a>
      </div>
    </section>

    <!-- Right: Summary -->
    <aside class="cart-right">
      <div class="summary-card">
        <h3>Order Summary</h3>

        <div class="summary-row">
          <span>Subtotal</span>
          <span>₹<span id="subTotal">0</span></span>
        </div>

        <div class="summary-row">
          <span>Shipping</span>
          <span id="shippingText">FREE</span>
        </div>

        <div class="summary-row total">
          <span>Total</span>
          <span>₹<span id="cartTotal">0</span></span>
        </div>
        <button class="btn btn-primary" id="checkoutBtn">
  Proceed to Checkout
</button>

<!-- Checkout Form -->
<div class="checkout-form" style="margin-top:15px;">
  <input id="custName" type="text" placeholder="Your Name" required />
  <input id="custPhone" type="text" placeholder="Phone Number" required />
  <textarea id="custAddress" placeholder="Delivery Address" required></textarea>

  <button class="btn btn-primary" id="placeOrderBtn" style="margin-top:10px;">
    Place Order
  </button>
</div>

<p class="note">*This is a demo cart using localStorage.</p>
      </div>
    </aside>
  </main>

  <script src="store.js"></script>
<script src="cart.js"></script>
<script src="auth.js"></script>



   <!-- Back button script -->
  <script>
    function goBack(){
      window.history.back();
    }
  </script>
</body>
</html>
